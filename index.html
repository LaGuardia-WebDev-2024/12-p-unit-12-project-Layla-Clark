<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 12 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <h1>Quiz About [Me]</h1>
    <hr />
    <!-- Movie Question -->
    <form id="movie-form">
      <label>
        🎥 What instrument do I play?
        <select id="movie-answer">
          <option value="movie1">Piano</option>
          <option value="movie2">Violin</option>
          <option value="movie3">Clarinet</option>
          <option value="movie4">Harp</option>
        </select>
      </label>
      <button type="submit">Check Movie Answer</button>
    </form>
    <div id="movie-result">
      <p id="movie-text"></p>
    </div>
    <hr />
    <!-- Book Question -->
    <form id="book-form">
      <label>
        📖 What borough do I live in?
        <select id="book-answer">
          <option value="book1">Manhattan</option>
          <option value="book2">Queens</option>
          <option value="book3">Brooklyn</option>
          <option value="book4">Bronx</option>
        </select>
      </label>
      <button type="submit">Check Book Answer</button>
    </form>
    <div id="book-result">
      <p id="book-text"></p>
    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
      
      //========================Movie Question jQuery Code
      $("#movie-form").on("submit", function (event) {
        event.preventDefault();

$("#movie-result").hide()


        var $answer = $("#movie-answer");
        var answer = $answer.val();

        if (answer === "movie1") {
          $("#movie-text").text("YES!");
        } 
        if (answer === "movie2") {
          $("#movie-text").text("Sort of...");
        } 
         if (answer === "movie3") {
          $("#movie-text").text("Try again!");
        } 
         if (answer === "movie4") {
          $("#movie-text").text("Try again!");
        } 
        $("#movie-result").show(2000)
      });



      //=======================Book Question jQuery Code
      $("#book-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#book-answer");
        var answer = $answer.val();

        if (answer === "book3") {
          $("#book-text").text("Yes!");
        } 
        else {
          $("#book-text").text("Try Again!");
        }
      });
      
    </script>
  </body>

  <!--- Taken From Khan Academy HTML/JS: Making webpages interactive with jQuery-->
</html>
